<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription - Port de Plaisance Russell</title>
  <meta name="description" content="Créer un compte utilisateur pour accéder aux services du Port de Plaisance Russell.">
</head>
<body>
  <h2>Créer un compte</h2>

  <form id="registerForm">
    <input type="text" id="username" placeholder="Nom d'utilisateur" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Mot de passe" required>
    <button type="submit">S'inscrire</button>
  </form>

  <p><a href="login.html">Déjà un compte ? Se connecter</a></p>
  <p><a href="index.html">Retour à l'accueil</a></p>

  <script src="js/register.js"></script>
</body>
</html>
